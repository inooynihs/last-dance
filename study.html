<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>유니의 마지막 도전 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="study.css"/>
</head>
<body>

  <!-- 배경 장식 -->
  <div class="bg-deco">
    <span class="bg-star s1">✦</span>
    <span class="bg-star s2">✿</span>
    <span class="bg-star s3">✦</span>
    <span class="bg-star s4">❀</span>
    <span class="bg-star s5">✦</span>
    <span class="bg-star s6">✿</span>
  </div>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">

      <!-- 왼쪽: 고양이 + 타이틀 -->
      <div class="header-left">
        <!-- SVG 치비 캐릭터 (핑크 머리, 큰 눈, 리본, 꽃) -->
        <div class="cat-wrap">
          <svg class="cat-svg" viewBox="0 0 110 150" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 몸통 (흰 자켓) -->
            <ellipse cx="55" cy="125" rx="30" ry="22" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
            <!-- 스커트 (빨간) -->
            <path d="M30 135 Q55 148 80 135 L78 150 Q55 155 32 150 Z" fill="#e53935"/>
            <!-- 팔 왼쪽 -->
            <ellipse cx="24" cy="118" rx="8" ry="14" fill="white" stroke="#e0e0e0" stroke-width="1.2" transform="rotate(-15 24 118)"/>
            <!-- 팔 오른쪽 -->
            <ellipse cx="86" cy="118" rx="8" ry="14" fill="white" stroke="#e0e0e0" stroke-width="1.2" transform="rotate(15 86 118)"/>
            <!-- 목 -->
            <rect x="48" y="92" width="14" height="12" rx="4" fill="#ffe0b2"/>
            <!-- 얼굴 -->
            <ellipse cx="55" cy="72" rx="32" ry="30" fill="#ffe0b2" stroke="#ffb3d1" stroke-width="1.5"/>
            <!-- 핑크 머리 (큰 모자처럼) -->
            <ellipse cx="55" cy="52" rx="36" ry="28" fill="#f48fb1"/>
            <!-- 머리 앞머리 -->
            <path d="M22 58 Q30 44 44 50 Q50 42 55 48 Q60 42 66 50 Q80 44 88 58" fill="#f48fb1" stroke="#f48fb1" stroke-width="1"/>
            <!-- 흰 리본 (왼쪽 큰 리본) -->
            <path d="M14 45 Q24 38 28 48 Q24 52 14 45Z" fill="white" stroke="#e0e0e0" stroke-width="1"/>
            <path d="M14 45 Q18 55 28 52 Q24 52 14 45Z" fill="white" stroke="#e0e0e0" stroke-width="1"/>
            <circle cx="22" cy="48" r="4" fill="white" stroke="#e0e0e0" stroke-width="1"/>
            <!-- 꽃 장식 (오른쪽) -->
            <circle cx="80" cy="36" r="8" fill="white" stroke="#ffb3d1" stroke-width="1.5"/>
            <circle cx="74" cy="31" r="5" fill="white" stroke="#ffb3d1" stroke-width="1"/>
            <circle cx="86" cy="31" r="5" fill="white" stroke="#ffb3d1" stroke-width="1"/>
            <circle cx="74" cy="41" r="5" fill="white" stroke="#ffb3d1" stroke-width="1"/>
            <circle cx="86" cy="41" r="5" fill="white" stroke="#ffb3d1" stroke-width="1"/>
            <circle cx="80" cy="36" r="4" fill="#fff9c4"/>
            <!-- 눈 (크고 동글동글) -->
            <circle cx="43" cy="68" r="10" fill="white"/>
            <circle cx="43" cy="68" r="8" fill="#1a1a2e"/>
            <circle cx="46" cy="65" r="3" fill="white"/>
            <circle cx="43" cy="73" r="1.5" fill="white" opacity="0.6"/>
            <circle cx="67" cy="68" r="10" fill="white"/>
            <circle cx="67" cy="68" r="8" fill="#1a1a2e"/>
            <circle cx="70" cy="65" r="3" fill="white"/>
            <circle cx="67" cy="73" r="1.5" fill="white" opacity="0.6"/>
            <!-- 속눈썹 -->
            <path d="M34 61 Q35 58 37 60" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round" fill="none"/>
            <path d="M52 61 Q51 58 49 60" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round" fill="none"/>
            <!-- 볼 (핑크) -->
            <ellipse cx="32" cy="76" rx="9" ry="6" fill="#f48fb1" opacity="0.45"/>
            <ellipse cx="78" cy="76" rx="9" ry="6" fill="#f48fb1" opacity="0.45"/>
            <!-- 코 -->
            <path d="M52 77 Q55 80 58 77" stroke="#e91e63" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <!-- 입 -->
            <path d="M48 83 Q55 90 62 83" stroke="#c2185b" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            <!-- 옷 단추 -->
            <circle cx="55" cy="108" r="2.5" fill="#ffb3d1"/>
            <circle cx="55" cy="116" r="2.5" fill="#ffb3d1"/>
            <!-- 발 (빨간 부츠) -->
            <ellipse cx="43" cy="148" rx="10" ry="6" fill="#e53935" stroke="#c62828" stroke-width="1"/>
            <ellipse cx="67" cy="148" rx="10" ry="6" fill="#e53935" stroke="#c62828" stroke-width="1"/>
          </svg>
        </div>

        <div class="header-title-wrap">
          <h1 class="header-title">유니의 마지막 도전</h1>
          <p class="header-title-sub">🌸 2026 수험생활 기록 🌸</p>
        </div>
      </div>

      <!-- 오른쪽: 명언 카드 -->
      <div class="quote-card" id="quoteCard">
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-author" id="quoteAuthor"></p>
      </div>
    </div>

    <!-- 달 이동 -->
    <div class="month-nav">
      <button class="month-btn" id="prevMonth">‹</button>
      <h2 class="month-title" id="monthTitle"></h2>
      <button class="month-btn" id="nextMonth">›</button>
    </div>
  </header>

  <!-- 달력 -->
  <main class="calendar-wrap">
    <div class="calendar-header">
      <span>일</span><span>월</span><span>화</span><span>수</span>
      <span>목</span><span>금</span><span>토</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>

  <!-- 날짜 모달 -->
  <div class="modal-overlay" id="dayModal">
    <div class="modal day-modal">
      <button class="modal-close" id="dayModalClose">✕</button>
      <div class="day-modal-header">
        <h3 class="day-modal-date" id="dayModalDate"></h3>
        <p class="day-modal-special" id="dayModalSpecial"></p>
      </div>
      <div class="day-photos" id="dayPhotos"></div>
      <div class="day-comment-wrap">
        <p class="day-comment-text" id="dayCommentText"></p>
        <div class="day-comment-empty" id="dayCommentEmpty">오늘의 기록이 없어요 🌸</div>
      </div>
      <div class="day-edit-ui" id="dayEditUi" style="display:none;">
        <button class="add-photo-btn" id="addPhotoBtn">📷 사진 추가</button>
        <textarea class="comment-input" id="commentInput" placeholder="오늘 하루 어떠셨나요? 🌷" rows="3"></textarea>
        <button class="save-day-btn" id="saveDayBtn">💾 저장</button>
      </div>
    </div>
  </div>

  <!-- 비번 모달 -->
  <div class="modal-overlay" id="pwModal">
    <div class="modal pw-modal">
      <h3 class="pw-title">🔐 비밀번호</h3>
      <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호를 입력해주세요"/>
      <div class="pw-btns">
        <button class="pw-cancel" id="pwCancel">취소</button>
        <button class="pw-confirm" id="pwConfirm">확인</button>
      </div>
    </div>
  </div>

  <div class="admin-bar" id="adminBar">
    <span>✏️ 편집 모드</span>
    <button class="admin-exit-btn" id="adminExitBtn">종료</button>
  </div>

  <button class="lock-fab" id="lockFab" title="편집 모드">🔒</button>

  <script type="module" src="study.js"></script>
</body>
</html>
