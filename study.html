<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>유니의 마지막 도전 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="study.css"/>
</head>
<body>

  <!-- 배경 이모티콘 장식 -->
  <div class="bg-deco">
    <span class="bg-emo e1">🌸</span>
    <span class="bg-emo e2">✨</span>
    <span class="bg-emo e3">🎀</span>
    <span class="bg-emo e4">🌷</span>
    <span class="bg-emo e5">⭐</span>
    <span class="bg-emo e6">🍭</span>
    <span class="bg-emo e7">🌸</span>
    <span class="bg-emo e8">💕</span>
    <span class="bg-emo e9">✨</span>
    <span class="bg-emo e10">🎀</span>
    <span class="bg-emo e11">🌷</span>
    <span class="bg-emo e12">⭐</span>
  </div>

  <!-- 헤더 -->
  <!-- 상단 스티커 띠 -->
  <div class="sticker-strip">
    <span>🌸</span><span>✨</span><span>📚</span><span>🎀</span>
    <span>🌷</span><span>⭐</span><span>🍀</span><span>💕</span>
    <span>🌸</span><span>✨</span><span>📚</span><span>🎀</span>
    <span>🌷</span><span>⭐</span><span>🍀</span><span>💕</span>
    <span>🌸</span><span>✨</span><span>📚</span><span>🎀</span>
    <span>🌷</span><span>⭐</span><span>🍀</span><span>💕</span>
  </div>

  <header class="site-header">
    <div class="header-inner">

      <!-- 왼쪽: 고양이 + 타이틀 -->
      <div class="header-left">
        <!-- 캐릭터 이미지 -->
        <div class="cat-wrap">
          <img class="cat-img" src="https://firebasestorage.googleapis.com/v0/b/yuni-archive.firebasestorage.app/o/common.jpeg?alt=media&token=09f18d13-03db-40c8-9d41-6c59277375ff" alt="캐릭터" id="charImage">
        </div>

        <div class="header-title-wrap">
          <h1 class="header-title">유니의 마지막 도전</h1>
          <p class="header-title-sub">🌸 2026 수험생활 기록 🌸</p>
        </div>
      </div>

      <!-- 오른쪽: 명언 카드 -->
      <div class="quote-card" id="quoteCard">
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-author" id="quoteAuthor"></p>
      </div>
    </div>

    <!-- 달 이동 -->
    <div class="month-nav">
      <button class="month-btn" id="prevMonth">‹</button>
      <h2 class="month-title" id="monthTitle"></h2>
      <button class="month-btn" id="nextMonth">›</button>
    </div>
  </header>

  <!-- 달력 -->
  <main class="calendar-wrap">
    <div class="calendar-header">
      <span>일</span><span>월</span><span>화</span><span>수</span>
      <span>목</span><span>금</span><span>토</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>

  <!-- 날짜 모달 -->
  <div class="modal-overlay" id="dayModal">
    <div class="modal day-modal">
      <button class="modal-close" id="dayModalClose">✕</button>
      <div class="day-modal-header">
        <h3 class="day-modal-date" id="dayModalDate"></h3>
        <p class="day-modal-special" id="dayModalSpecial"></p>
      </div>
      <div class="day-photos" id="dayPhotos"></div>
      <div class="day-comment-wrap">
        <p class="day-comment-text" id="dayCommentText"></p>
        <div class="day-comment-empty" id="dayCommentEmpty">오늘의 기록이 없어요 🌸</div>
      </div>
      <div class="day-edit-ui" id="dayEditUi" style="display:none;">
        <button class="add-photo-btn" id="addPhotoBtn">📷 사진 추가</button>
        <textarea class="comment-input" id="commentInput" placeholder="오늘 하루 어떠셨나요? 🌷" rows="3"></textarea>
        <button class="save-day-btn" id="saveDayBtn">💾 저장</button>
      </div>
    </div>
  </div>

  <!-- 비번 모달 -->
  <div class="modal-overlay" id="pwModal">
    <div class="modal pw-modal">
      <h3 class="pw-title">🔐 비밀번호</h3>
      <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호를 입력해주세요"/>
      <div class="pw-btns">
        <button class="pw-cancel" id="pwCancel">취소</button>
        <button class="pw-confirm" id="pwConfirm">확인</button>
      </div>
    </div>
  </div>

  <div class="admin-bar" id="adminBar">
    <span>✏️ 편집 모드</span>
    <button class="admin-exit-btn" id="adminExitBtn">종료</button>
  </div>

  <button class="lock-fab" id="lockFab" title="편집 모드">🔒</button>

  <script type="module" src="study.js"></script>
</body>
</html>
